name: Workspace bundles

on:
  workflow_dispatch:
  push:
    branches: [feature/provisioning]
    paths:
      - images/workspace/bundles/ubuntu-packages.toml
      - images/workspace/versions.lock
      - scripts/produce-ubuntu-package-bundle.sh
      - tests/image/system-tools.txt

jobs:
  ubuntu-packages-linux-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Install deterministic repository tooling
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends python3-apt xz-utils zstd
      - name: Produce Ubuntu package closure
        run: |
          scripts/produce-ubuntu-package-bundle.sh "$RUNNER_TEMP/ubuntu-package-bundle"
          sha256sum images/workspace/versions.lock | cut -d' ' -f1 >"$RUNNER_TEMP/ubuntu-package-bundle/versions.lock.sha256"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ubuntu-packages-linux-arm64
          path: ${{ runner.temp }}/ubuntu-package-bundle/*
          if-no-files-found: error
          retention-days: 7
  publish-ubuntu-packages-linux-arm64:
    needs: ubuntu-packages-linux-arm64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ubuntu-packages-linux-arm64
          path: ${{ runner.temp }}/ubuntu-package-bundle
      - name: Revalidate and publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          input_digest=$(tr -d '[:space:]' <"$RUNNER_TEMP/ubuntu-package-bundle/versions.lock.sha256")
          [[ $input_digest =~ ^[0-9a-f]{64}$ ]]
          tag="workspace-bundles-$input_digest"
          directory="$RUNNER_TEMP/ubuntu-package-bundle"
          archive="$directory/ubuntu-packages-linux-arm64.tar.zst"
          expected_sha=$(tr -d '[:space:]' <"$archive.sha256")
          expected_size=$(tr -d '[:space:]' <"$archive.size")
          test "$(sha256sum "$archive" | cut -d' ' -f1)" = "$expected_sha"
          test "$(wc -c <"$archive" | tr -d ' ')" = "$expected_size"
          test -s "$directory/ubuntu-packages-linux-arm64.manifest.tsv"
          test -s "$directory/ubuntu-packages-linux-arm64.provenance.env"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Immutable workspace bundle inputs for versions.lock SHA-256 $input_digest"
          fi
          for asset in "$directory"/*; do
            name=$(basename -- "$asset")
            existing="$RUNNER_TEMP/existing-$name"
            if gh release download "$tag" --pattern "$name" --output "$existing" 2>/dev/null; then
              cmp --silent "$asset" "$existing" || { echo "release asset collision with different bytes: $name" >&2; exit 1; }
            else
              gh release upload "$tag" "$asset"
            fi
          done
